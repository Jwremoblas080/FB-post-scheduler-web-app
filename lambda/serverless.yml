service: fb-post-scheduler

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 29
  environment:
    STAGE: ${self:provider.stage}
    FACEBOOK_APP_ID: ${ssm:/fb-scheduler/${self:provider.stage}/facebook-app-id}
    FACEBOOK_APP_SECRET: ${ssm(raw):/fb-scheduler/${self:provider.stage}/facebook-app-secret}
    FACEBOOK_REDIRECT_URI: ${ssm:/fb-scheduler/${self:provider.stage}/facebook-redirect-uri}
    ENCRYPTION_KEY: ${ssm(raw):/fb-scheduler/${self:provider.stage}/encryption-key}
    ENCRYPTION_SECRET: ${ssm(raw):/fb-scheduler/${self:provider.stage}/encryption-secret}
    JWT_SECRET: ${ssm(raw):/fb-scheduler/${self:provider.stage}/jwt-secret}
    S3_BUCKET: ${self:custom.s3Bucket}
    S3_REGION: ${self:provider.region}
    DYNAMODB_TABLE: ${self:custom.dynamoTable}
    FRONTEND_URL: ${ssm:/fb-scheduler/${self:provider.stage}/frontend-url}
    ALLOWED_ORIGINS: ${ssm:/fb-scheduler/${self:provider.stage}/allowed-origins}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt SchedulerTable.Arn
            - !Sub '${SchedulerTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource: !Sub 'arn:aws:s3:::${self:custom.s3Bucket}/*'
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:GetParameters
          Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fb-scheduler/${self:provider.stage}/*'

custom:
  s3Bucket: fb-post-scheduler-uploads-${self:provider.stage}
  dynamoTable: fb-post-scheduler-${self:provider.stage}

functions:
  api:
    handler: dist/handlers/api.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

  scheduler:
    handler: dist/handlers/scheduler.handler
    timeout: 300
    events:
      - schedule:
          rate: rate(1 minute)
          enabled: true

resources:
  Resources:
    SchedulerTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.dynamoTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    MediaBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3Bucket}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST]
              AllowedOrigins: 
                - 'https://fb-post-scheduler-web-app-*.vercel.app'
                - 'http://localhost:5173'
              MaxAge: 3000
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    MediaBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref MediaBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub 'arn:aws:s3:::${self:custom.s3Bucket}/*'

plugins: []

package:
  individually: false
  patterns:
    - 'dist/**'
    - 'node_modules/**'
    - '!node_modules/.cache/**'
    - '!node_modules/typescript/**'
    - '!node_modules/serverless/**'
    - '!src/**'
    - '!frontend/**'
    - '!coverage/**'
    - '!data/**'
    - '!uploads/**'
    - '!*.md'
    - '!handlers/**'
    - '!services/**'
    - '!utils/**'
